<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky 3D | Toolbox</title>
    <link rel="stylesheet" href="css/toolbox.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sky-nav">
        <a href="/" class="sky-logo">SKY <span class="accent">3D</span> TOOLBOX</a>
    </nav>

    <main class="sky-container">
        <div id="home-view">
            <header class="sky-header">
                <h1>Herramientas Técnicas</h1>
                <p>Panel de control para impresión 3D y electrónica.</p>
            </header>

            <div class="sky-grid">
                <div class="sky-card" onclick="showTool('calc3d')">
                    <div class="icon">🚀</div>
                    <h3>Sky 3D Scale</h3>
                    <p>Cotizador de filamentos por peso y tipo.</p>
                </div>

                <div class="sky-card" onclick="showTool('diametro')">
                    <div class="icon">📏</div>
                    <h3>Cálculo de Diámetro</h3>
                    <p>Conversión técnica para diseño en Fusion 360.</p>
                </div>

                <div class="sky-card disabled">
                    <div class="icon">🔋</div>
                    <h3>Sky Power</h3>
                    <p>Próximamente: Análisis de celdas y Starlink.</p>
                </div>
            </div>
        </div>

        <div id="tool-view" class="sky-tool-area hidden">
            <button class="sky-btn-back" onclick="goHome()">← Volver al Panel</button>
            <div id="tool-render"></div>
        </div>
    </main>

    <script src="js/toolbox.js"></script>
</body>
</html>
