<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyScale 3D | Medidas y Escalado</title>
    <meta name="author" content="Franco Jesús Pacheco">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --accent: #8b5cf6;
            --success: #10b981;
            --text: #f4f4f5;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; min-height: 100vh; }

        .container { max-width: 1000px; margin: 0 auto; width: 100%; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-bottom: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border);
        }

        .logo-box { 
            width: 48px; height: 48px; background: var(--accent); border-radius: 14px;
            display: flex; justify-content: center; align-items: center; font-size: 20px; color: white;
            transform: rotate(3deg); box-shadow: 0 8px 16px rgba(139,92,246,0.25);
        }

        .header-text h1 { font-size: 24px; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; line-height: 1; }
        .header-text p { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

        .btn-hist { 
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 10px 16px; border-radius: 12px; font-size: 11px; font-weight: 800;
            text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-hist:hover { border-color: var(--accent); }

        .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .main-grid { grid-template-columns: 1fr 1fr; } }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; }
        .card-h2 { font-size: 12px; font-weight: 900; color: var(--text-dim); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-style: italic; }

        .tabs { display: flex; background: #000; padding: 4px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; border: none; background: none; color: var(--text-dim); font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 10px; transition: 0.2s; }
        .tab.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(139,92,246,0.3); }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-family: monospace; }
        
        .flex-input { display: flex; }
        input, select { 
            background: #09090b; border: 1px solid var(--border); color: white; 
            padding: 14px; font-size: 18px; font-weight: 700; outline: none; 
            border-radius: 12px; width: 100%; font-family: monospace; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .flex-input input { border-top-right-radius: 0; border-bottom-right-radius: 0; }
        .flex-input select { width: 85px; border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0; color: var(--accent); font-weight: 900; }

        .res-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .res-box { background: rgba(0,0,0,0.3); padding: 16px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .res-val { font-size: 26px; font-weight: 900; color: white; margin-top: 4px; font-family: monospace; }

        .btn-action { 
            width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; gap: 10px; font-size: 12px; transition: 0.2s; 
        }
        .btn-accent { background: var(--accent); color: white; box-shadow: 0 8px 16px rgba(139,92,246,0.2); }
        .btn-save { background: transparent; border: 1px solid var(--border); color: var(--text-dim); margin-top: 12px; }
        .btn-success { background: var(--success) !important; color: white; }

        .scale-result { 
            background: rgba(16, 185, 129, 0.05); border: 2px dashed rgba(16, 185, 129, 0.2); 
            border-radius: 24px; padding: 40px 20px; text-align: center; margin: 20px 0; 
        }
        .scale-val { font-size: 52px; font-weight: 900; color: var(--success); font-family: monospace; text-shadow: 0 0 20px rgba(16,185,129,0.2); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); border: 1px solid var(--border); width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; }
        .modal-h { background: var(--accent); padding: 20px; text-align: center; color: white; font-weight: 900; text-transform: uppercase; font-style: italic; }

        .hist-item { background: #000; padding: 14px; border-radius: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .del-btn { background: none; border: none; color: #ef4444; opacity: 0.5; cursor: pointer; padding: 8px; transition: 0.2s; }
        .del-btn:hover { opacity: 1; }

        footer { margin-top: 50px; text-align: center; padding: 30px; border-top: 1px solid var(--border); color: #3f3f46; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="display:flex; align-items:center; gap:16px;">
            <div class="logo-box"><i class="fas fa-ruler-combined"></i></div>
            <div class="header-text">
                <h1>SkyScale 3D</h1>
                <p>Búnker de Precisión SkyDev</p>
            </div>
        </div>
        <button class="btn-hist" onclick="toggleHist(true)"><i class="fas fa-clock-rotate-left"></i> Historial</button>
    </header>

    <div class="main-grid">
        <div class="card">
            <h2 class="card-h2"><i class="fas fa-circle-notch" style="color:var(--accent)"></i> Cálculo de Diámetro</h2>
            <div class="tabs">
                <button id="tab-c" class="tab active" onclick="setMode('cinta')">Circunferencia</button>
                <button id="tab-v" class="tab" onclick="setMode('calibre')">Puntos en V</button>
            </div>

            <div class="input-group">
                <label id="lbl-input">Medida de la Cinta</label>
                <div class="flex-input">
                    <input type="number" id="in-val" placeholder="0" oninput="runCalc()">
                    <select id="in-unit" onchange="runCalc()">
                        <option value="cm">CM</option>
                        <option value="mm">MM</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Holgura / Tolerancia (mm)</label>
                <input type="number" id="in-tol" placeholder="0.00" step="0.01" oninput="runCalc()">
            </div>

            <div class="res-container">
                <div class="res-box">
                    <label>Diámetro</label>
                    <div id="out-dia" class="res-val">0.00</div>
                </div>
                <div class="res-box">
                    <label>Radio</label>
                    <div id="out-rad" class="res-val">0.00</div>
                </div>
            </div>

            <button class="btn-action btn-accent" onclick="passToScale()">Usar Diámetro <i class="fas fa-arrow-right"></i></button>
            <button id="btn-save-main" class="btn-action btn-save" onclick="showSave()"><i class="fas fa-floppy-disk"></i> Guardar en Historial</button>
        </div>

        <div class="card">
            <h2 class="card-h2"><i class="fas fa-expand-arrows-alt" style="color:var(--success)"></i> Factor de Escalado</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:20px;">
                <div>
                    <label>Medida STL (Slicer)</label>
                    <input type="number" id="sc-orig" placeholder="0" oninput="runCalc()">
                </div>
                <div>
                    <label>Medida Real (Objetivo)</label>
                    <input type="number" id="sc-targ" placeholder="0" oninput="calcScaleOnly()">
                </div>
            </div>

            <div class="scale-result">
                <label style="color:var(--success)">Porcentaje de Escala</label>
                <div id="out-scale" class="scale-val">100%</div>
                <button onclick="copyRes()" style="background:none; border:none; color:var(--text-dim); font-size:10px; font-weight:800; cursor:pointer; margin-top:16px; text-decoration:underline;">COPIAR VALOR</button>
            </div>
            
            <p style="font-size:11px; color:var(--text-dim); line-height:1.4; text-align:center; font-style:italic;">
                Tip: Calibrá primero el <b>Flow Ratio</b> en Toolbox para encajes perfectos.
            </p>
        </div>
    </div>
</div>

<div id="mod-save" class="modal">
    <div class="modal-content">
        <div class="modal-h">Guardar Registro</div>
        <div style="padding:24px;">
            <label>Nombre de la Pieza / Proyecto</label>
            <input type="text" id="save-name" placeholder="Ej: Inserto Chopp 360ml">
            <div style="display:flex; gap:12px; margin-top:24px;">
                <button class="btn-action btn-save" style="margin:0" onclick="showSave(false)">Cancelar</button>
                <button class="btn-action btn-accent" style="margin:0" onclick="confirmSave()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<div id="mod-hist" class="modal">
    <div class="modal-content" style="max-width:450px;">
        <div class="modal-h">Historial de Medidas</div>
        <div id="hist-list" style="padding:20px; max-height:400px; overflow-y:auto;"></div>
        <div style="padding:16px; border-top:1px solid var(--border); text-align:center;">
            <button class="btn-action btn-save" onclick="toggleHist(false)">Cerrar</button>
        </div>
    </div>
</div>

<footer>SkyDev Software © 2026 | Catamarca, Argentina</footer>

<script>
    let mode = 'cinta';
    let storage = JSON.parse(localStorage.getItem('sky_scale_db')) || [];

    function setMode(m) {
        mode = m;
        document.getElementById('tab-c').className = m === 'cinta' ? 'tab active' : 'tab';
        document.getElementById('tab-v').className = m === 'calibre' ? 'tab active' : 'tab';
        document.getElementById('lbl-input').innerText = m === 'cinta' ? 'Medida de la Cinta' : 'Lectura en V (90°)';
        runCalc();
    }

    function runCalc() {
        let val = parseFloat(document.getElementById('in-val').value) || 0;
        let tol = parseFloat(document.getElementById('in-tol').value) || 0;
        let unit = document.getElementById('in-unit').value;

        if (unit === 'cm') val *= 10;

        let dia = 0;
        if (mode === 'cinta') {
            dia = val > 0 ? (val / Math.PI) + tol : 0;
        } else {
            // Constante para bloque en V de 90 grados
            dia = val > 0 ? (val * 2.4142 * 2) + tol : 0;
        }

        document.getElementById('out-dia').innerText = dia.toFixed(2);
        document.getElementById('out-rad').innerText = (dia / 2).toFixed(2);
        calcScaleOnly();
    }

    function calcScaleOnly() {
        let orig = parseFloat(document.getElementById('sc-orig').value) || 0;
        let targ = parseFloat(document.getElementById('sc-targ').value) || 0;
        let res = (orig > 0 && targ > 0) ? ((targ / orig) * 100).toFixed(2) : "100.00";
        document.getElementById('out-scale').innerText = res + "%";
    }

    function passToScale() {
        let dia = document.getElementById('out-dia').innerText;
        if (parseFloat(dia) > 0) {
            document.getElementById('sc-targ').value = dia;
            calcScaleOnly();
        }
    }

    function copyRes() {
        let val = document.getElementById('out-scale').innerText;
        navigator.clipboard.writeText(val);
        alert("¡Copiado al portapapeles!");
    }

    function showSave(st = true) {
        if (st && parseFloat(document.getElementById('out-dia').innerText) <= 0) return;
        document.getElementById('mod-save').classList.toggle('active', st);
    }

    function confirmSave() {
        let name = document.getElementById('save-name').value.trim() || "Sin nombre";
        storage.unshift({
            id: Date.now(),
            name: name,
            dia: document.getElementById('out-dia').innerText,
            scale: document.getElementById('out-scale').innerText,
            date: new Date().toLocaleDateString()
        });
        localStorage.setItem('sky_scale_db', JSON.stringify(storage.slice(0, 20)));
        showSave(false);
        let btn = document.getElementById('btn-save-main');
        btn.classList.add('btn-success');
        setTimeout(() => btn.classList.remove('btn-success'), 1000);
    }

    function toggleHist(st) {
        if (st) renderHist();
        document.getElementById('mod-hist').classList.toggle('active', st);
    }

    function renderHist() {
        const container = document.getElementById('hist-list');
        container.innerHTML = storage.length ? storage.map(i => `
            <div class="hist-item">
                <div>
                    <div style="font-weight:900; font-size:11px; text-transform:uppercase; color:white;">${i.name}</div>
                    <div style="font-size:10px; color:var(--text-dim)">D: ${i.dia}mm | ${i.scale}</div>
                </div>
                <button class="del-btn" onclick="deleteItem(${i.id})"><i class="fas fa-trash"></i></button>
            </div>
        `).join('') : '<p style="text-align:center; color:var(--text-dim); font-size:11px;">HISTORIAL VACÍO</p>';
    }

    function deleteItem(id) {
        storage = storage.filter(i => i.id !== id);
        localStorage.setItem('sky_scale_db', JSON.stringify(storage));
        renderHist();
    }
</script>

</body>
</html>
