<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyScale 3D | Medidas</title>
    <meta name="author" content="Franco Jesús Pacheco">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --text: #f4f4f5;
            --text-dim: #a1a1aa;
            --accent: #8b5cf6;
            --success: #10b981;
            --emerald-dim: rgba(16, 185, 129, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 12px; font-size: 14px; line-height: 1.5; }

        .container { max-width: 1000px; margin: 0 auto; }

        header { 
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border);
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-box { 
            width: 42px; height: 42px; background: var(--accent); border-radius: 12px;
            display: flex; justify-content: center; align-items: center; color: white;
            font-size: 18px; transform: rotate(3deg); box-shadow: 0 4px 12px rgba(139,92,246,0.3);
        }

        h1 { font-size: 22px; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; }
        .subtitle { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .btn-history { 
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 8px 16px; border-radius: 10px; font-size: 11px; font-weight: 800;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }

        .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
        .card-title { 
            font-size: 12px; font-weight: 900; color: var(--text-dim); 
            text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }

        .tabs { display: flex; background: #000; padding: 4px; border-radius: 12px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 10px; border: none; background: none; color: var(--text-dim);
            font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 8px;
        }
        .tab-btn.active { background: var(--border); color: white; }

        label { display: block; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
        .input-group { display: flex; margin-bottom: 16px; }
        input, select { 
            background: #09090b; border: 1px solid var(--border); color: white;
            padding: 12px; font-size: 16px; font-weight: 700; outline: none; border-radius: 10px; width: 100%;
        }
        .input-group input { border-top-right-radius: 0; border-bottom-right-radius: 0; }
        .input-group select { border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0; width: 80px; color: var(--accent); }

        .res-box { 
            background: rgba(0,0,0,0.2); border: 1px solid var(--border); 
            padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px;
        }
        .res-value { font-size: 32px; font-weight: 900; color: white; font-family: monospace; }
        .res-label { font-size: 9px; font-weight: 900; color: var(--accent); text-transform: uppercase; }

        .btn-main { 
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-weight: 800; text-transform: uppercase; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;
        }
        .btn-accent { background: var(--accent); color: white; }
        .btn-save { background: transparent; border: 1px solid var(--border); color: var(--text-dim); margin-top: 10px; }
        .btn-success { background: var(--success) !important; color: white !important; }

        .scale-display { 
            background: var(--emerald-dim); border: 1px solid rgba(16,185,129,0.2);
            padding: 30px; border-radius: 24px; text-align: center; margin-top: 20px;
        }
        .scale-value { font-size: 48px; font-weight: 900; color: #10b981; font-family: monospace; }

        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100;
        }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); border: 1px solid var(--border); width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; }
        .modal-header { background: var(--accent); padding: 15px; text-align: center; color: white; font-weight: 900; text-transform: uppercase; font-style: italic; }
        .modal-body { padding: 20px; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <div class="logo-box"><i class="fas fa-ruler-combined"></i></div>
                <div>
                    <h1>SkyScale 3D</h1>
                    <p class="subtitle">Makers Precision Tool</p>
                </div>
            </div>
            <button class="btn-history" onclick="openSavedModal()">
                <i class="fas fa-clock-rotate-left"></i> Historial
            </button>
        </header>

        <div class="grid">
            <div class="card">
                <h2 class="card-title"><i class="fas fa-circle-notch" style="color:var(--accent)"></i> Obtener Diámetro</h2>
                
                <div class="tabs">
                    <button id="tab-cinta" class="tab-btn active" onclick="setTool('cinta')">Circunferencia</button>
                    <button id="tab-calibre" class="tab-btn" onclick="setTool('calibre')">Puntos en V</button>
                </div>

                <label id="input-label">Medida de la Cinta</label>
                <div class="input-group">
                    <input type="number" id="input-val" placeholder="0" oninput="handleInput()">
                    <select id="input-unit" onchange="handleUnitChange()">
                        <option value="cm">CM</option>
                        <option value="mm">MM</option>
                    </select>
                </div>

                <label>Tolerancia (Holgura mm)</label>
                <input type="number" id="input-tolerance" placeholder="0.00" step="0.01" oninput="handleInput()" style="margin-bottom: 20px;">

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                    <div class="res-box">
                        <div class="res-label">Diámetro</div>
                        <div id="res-diametro" class="res-value">0.00</div>
                    </div>
                    <div class="res-box">
                        <div class="res-label">Radio</div>
                        <div id="res-radio" class="res-value">0.00</div>
                    </div>
                </div>

                <button class="btn-main btn-accent" onclick="enviarAEscalado()">
                    Usar para Escalar <i class="fas fa-arrow-right"></i>
                </button>
                <button id="btn-save" class="btn-main btn-save" onclick="openSavePrompt()">
                    <i class="fas fa-floppy-disk"></i> Guardar Medida
                </button>
            </div>

            <div class="card">
                <h2 class="card-title"><i class="fas fa-expand-arrows-alt" style="color:#10b981"></i> Factor de Escalado</h2>
                
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <div style="flex: 1;">
                        <label>Medida STL</label>
                        <input type="number" id="scale-orig" placeholder="0" oninput="calcularEscala()">
                    </div>
                    <div style="flex: 1;">
                        <label>Medida Real</label>
                        <input type="number" id="scale-target" placeholder="0" oninput="calcularEscala()">
                    </div>
                </div>

                <div class="scale-display">
                    <div class="res-label" style="color:#10b981">Porcentaje de Escala</div>
                    <div id="res-scale" class="scale-value">100%</div>
                    <button onclick="copyScale()" style="background:none; border:none; color:var(--text-dim); font-size: 10px; font-weight: 800; cursor:pointer; text-transform:uppercase; margin-top:10px;">
                        <i class="fas fa-copy"></i> Copiar Factor
                    </button>
                </div>

                <div style="margin-top: 25px; padding: 15px; background: rgba(245, 158, 11, 0.05); border-radius: 12px; border: 1px solid rgba(245, 158, 11, 0.1);">
                    <p style="font-size: 11px; color: #f59e0b; font-weight: 700; font-style: italic;">
                        <i class="fas fa-lightbulb"></i> Tip: Calibrá primero el flujo en Sky Toolbox para mayor precisión.
                    </p>
                </div>
            </div>
        </div>

        <footer style="margin-top: 40px; text-align: center; border-top: 1px solid var(--border); padding-top: 20px;">
            <p style="font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; color: #3f3f46;">
                SkyDev Software &copy; 2026 | Catamarca
            </p>
        </footer>
    </div>

    <div id="modal-save" class="modal">
        <div class="modal-content">
            <div class="modal-header">Guardar Registro</div>
            <div class="modal-body">
                <label>Nombre de la Pieza</label>
                <input type="text" id="save-name-input" placeholder="Ej: Inserto Chopp">
                <div style="display:flex; gap: 10px; margin-top: 20px;">
                    <button class="btn-main btn-save" style="margin:0" onclick="closeSavePrompt()">Cancelar</button>
                    <button class="btn-main btn-accent" style="margin:0" onclick="confirmSaveData()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-list" class="modal">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">Historial de Medidas</div>
            <div id="saved-list-container" class="modal-body" style="max-height: 400px; overflow-y: auto;">
                </div>
            <div style="padding: 15px; border-top: 1px solid var(--border); text-align: center;">
                <button class="btn-main btn-save" onclick="closeSavedModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        let currentTool = 'cinta';
        let toolsState = { cinta: { val: '', unit: 'cm', tolerance: '' }, calibre: { val: '', unit: 'mm', tolerance: '' } };
        let savedMeasures = JSON.parse(localStorage.getItem('sky_measures_v2')) || [];

        function setTool(tool) {
            currentTool = tool;
            document.getElementById('tab-cinta').classList.toggle('active', tool === 'cinta');
            document.getElementById('tab-calibre').classList.toggle('active', tool === 'calibre');
            document.getElementById('input-label').innerText = tool === 'cinta' ? "Medida de la Cinta" : "Lectura del Calibre";
            
            document.getElementById('input-val').value = toolsState[tool].val;
            document.getElementById('input-unit').value = toolsState[tool].unit;
            document.getElementById('input-tolerance').value = toolsState[tool].tolerance;
            calcularGeometria();
        }

        function handleInput() {
            toolsState[currentTool].val = document.getElementById('input-val').value;
            toolsState[currentTool].tolerance = document.getElementById('input-tolerance').value;
            calcularGeometria();
        }

        function handleUnitChange() {
            toolsState[currentTool].unit = document.getElementById('input-unit').value;
            calcularGeometria();
        }

        function calcularGeometria() {
            let val = parseFloat(toolsState[currentTool].val) || 0;
            let tol = parseFloat(toolsState[currentTool].tolerance) || 0;
            if (toolsState[currentTool].unit === 'cm') val *= 10;

            let d = currentTool === 'cinta' ? (val > 0 ? (val / Math.PI) + tol : 0) : (val > 0 ? (val * 2.4142 * 2) + tol : 0);
            document.getElementById('res-diametro').innerText = d.toFixed(2);
            document.getElementById('res-radio').innerText = (d / 2).toFixed(2);
            calcularEscala();
        }

        function enviarAEscalado() {
            let d = document.getElementById('res-diametro').innerText;
            if (parseFloat(d) > 0) {
                document.getElementById('scale-target').value = d;
                calcularEscala();
            }
        }

        function calcularEscala() {
            let o = parseFloat(document.getElementById('scale-orig').value) || 0;
            let t = parseFloat(document.getElementById('scale-target').value) || 0;
            document.getElementById('res-scale').innerText = (o > 0 && t > 0) ? ((t / o) * 100).toFixed(2) + "%" : "100%";
        }

        function copyScale() {
            navigator.clipboard.writeText(document.getElementById('res-scale').innerText);
            alert("¡Copiado!");
        }

        function openSavePrompt() { 
            if (parseFloat(document.getElementById('res-diametro').innerText) > 0) 
                document.getElementById('modal-save').classList.add('active'); 
        }
        function closeSavePrompt() { document.getElementById('modal-save').classList.remove('active'); }

        function confirmSaveData() {
            let name = document.getElementById('save-name-input').value.trim() || "Sin nombre";
            savedMeasures.unshift({
                id: Date.now(),
                name: name,
                d: document.getElementById('res-diametro').innerText,
                s: document.getElementById('res-scale').innerText,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('sky_measures_v2', JSON.stringify(savedMeasures.slice(0, 20)));
            closeSavePrompt();
            document.getElementById('btn-save').classList.add('btn-success');
            setTimeout(() => document.getElementById('btn-save').classList.remove('btn-success'), 1000);
        }

        function openSavedModal() {
            const container = document.getElementById('saved-list-container');
            container.innerHTML = savedMeasures.length ? savedMeasures.map(i => `
                <div style="background:#000; padding:12px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-weight:900; font-size:11px; text-transform:uppercase;">${i.name}</div>
                        <div style="font-size:10px; color:var(--text-dim)">${i.date} | D: ${i.d}mm</div>
                    </div>
                    <div style="font-family:monospace; color:var(--success); font-weight:800;">${i.s}</div>
                    <button onclick="deleteSaved(${i.id})" style="background:none; border:none; color:#ef4444; cursor:pointer;"><i class="fas fa-trash"></i></button>
                </div>
            `).join('') : '<p style="text-align:center; color:var(--text-dim); font-size:11px;">HISTORIAL VACÍO</p>';
            document.getElementById('modal-list').classList.add('active');
        }

        function closeSavedModal() { document.getElementById('modal-list').classList.remove('active'); }
        function deleteSaved(id) {
            savedMeasures = savedMeasures.filter(m => m.id !== id);
            localStorage.setItem('sky_measures_v2', JSON.stringify(savedMeasures));
            openSavedModal();
        }
    </script>
</body>
</html>
